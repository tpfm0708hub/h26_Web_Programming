<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>

        //window 객체가 다 불러와지면 실행
        window.onload = function() {
            let pTag = document.getElementById("ide")
            pTag.innerHTML = "pTag 내용을 읽었음."
        } 


        function changeText() {
            let pTag = document.getElementById("ide")
            pTag.innerHTML = '<em>수정된 내용</em>'
            //pTag.innerText = '<em>수정된 내용</em>'
        }
    </script>
</head>
<body>
    <hr>
    <p id = "ide"><strong>나는 홍길동입니다.</strong></p>
    <p>너는 홍길순입니다.<p>
    <button onclick = "changeText()">수정</button>
    <hr>
</body>
</html>
