<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>장애물 피하기 게임 - 랭킹/레벨 강화</title>

<style>
body { font-family: Arial, sans-serif; text-align: center; background-color: #f3f5f7; }
#gameArea { width: 700px; height: 400px; margin: 20px auto; border: 3px solid #333; background-color: white; position: relative; overflow: hidden; }
#gameArea.hit-effect { animation: areaShake 0.35s; }
#player { width: 40px; height: 40px; background-color: royalblue; position: absolute; left:50px; top:180px; border-radius: 8px; }
#player.hit-effect { animation: playerHit 0.35s; }
.obstacle { width:40px; height:40px; background-color: crimson; position:absolute; border-radius:50%; }
#info { font-size:18px; margin-top:10px; }
button { padding:8px 14px; margin:5px; font-size:15px; cursor:pointer; }
#message { font-size:20px; font-weight:bold; color:darkred; margin-top:10px; }
#ranking { font-size:16px; margin-top:10px; border-top:2px solid #333; padding-top:5px; }
#nameArea { margin-top:10px; }

@keyframes playerHit {
    0% { background-color: royalblue; transform: scale(1); }
    25% { background-color: orange; transform: scale(1.2); }
    50% { background-color: royalblue; transform: scale(0.9); }
    75% { background-color: orange; transform: scale(1.1); }
    100% { background-color: royalblue; transform: scale(1); }
}

@keyframes areaShake {
    0% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
    100% { transform: translateX(0); }
}
</style>

<script>
class Player {
    constructor(x, y, life) {
        this.x = x;
        this.y = y;
        this.life = life;
        this.speed = 20;
        this.hasPower = false;
    }

    move(direction) {
        if (direction === "up" && this.y > 0) this.y -= this.speed;
        if (direction === "down" && this.y < 360) this.y += this.speed;
        if (direction === "left" && this.x > 0) this.x -= this.speed;
        if (direction === "right" && this.x < 660) this.x += this.speed;
    }

    powerUp() {
        this.speed += 5;
        this.hasPower = true;
    }
}

class Obstacle {
    constructor(x, y, speed) {
        this.x = x;
        this.y = y;
        this.speed = speed;
    }

    move() {
        this.x -= this.speed;

        if (this.x < -40) {
            this.x = 700;
            this.y = Math.floor(Math.random() * 360);
        }
    }
}

const StorageManager = {
    save(game) {
        const saveData = {
            score: game.score,
            level: game.level,
            playerName: game.playerName,
            playerX: game.player.x,
            playerY: game.player.y,
            playerLife: game.player.life,
            playerSpeed: game.player.speed,
            playerHasPower: game.player.hasPower,
            saveUsed: game.saveUsed,
            obstacles: game.obstacles.map(ob => ({
                x: ob.x,
                y: ob.y,
                speed: ob.speed
            }))
        };

        localStorage.setItem("obstacleGameSaveData", JSON.stringify(saveData));
        alert("게임 상태 저장 완료! 이번 판에서는 중간 저장을 한 번만 사용할 수 있습니다.");
    },

    load() {
        const savedData = localStorage.getItem("obstacleGameSaveData");

        if (!savedData) {
            alert("저장된 게임 없음.");
            return null;
        }

        return JSON.parse(savedData);
    },

    clear() {
        localStorage.removeItem("obstacleGameSaveData");
    }
};

const UIManager = {
    updatePlayer(player) {
        const pt = document.getElementById("player");
        pt.style.left = player.x + "px";
        pt.style.top = player.y + "px";
    },

    updateInfo(game) {
        document.getElementById("scoreText").innerText = game.score;
        document.getElementById("lifeText").innerText = game.player.life;
        document.getElementById("levelText").innerText = game.level;
    },

    syncObstacleElements(obs) {
        const gameArea = document.getElementById("gameArea");
        let obTags = document.getElementsByClassName("obstacle");

        while (obTags.length < obs.length) {
            const newObstacle = document.createElement("div");
            newObstacle.className = "obstacle";
            gameArea.appendChild(newObstacle);
            obTags = document.getElementsByClassName("obstacle");
        }

        while (obTags.length > obs.length) {
            gameArea.removeChild(obTags[obTags.length - 1]);
            obTags = document.getElementsByClassName("obstacle");
        }
    },

    updateObstacle(obs) {
        this.syncObstacleElements(obs);

        const obTags = document.getElementsByClassName("obstacle");

        for (let i = 0; i < obs.length; i++) {
            obTags[i].style.left = obs[i].x + "px";
            obTags[i].style.top = obs[i].y + "px";
        }
    },

    playHitEffect() {
        const pt = document.getElementById("player");
        const gameArea = document.getElementById("gameArea");

        pt.classList.remove("hit-effect");
        gameArea.classList.remove("hit-effect");

        void pt.offsetWidth;
        void gameArea.offsetWidth;

        pt.classList.add("hit-effect");
        gameArea.classList.add("hit-effect");

        setTimeout(() => {
            pt.classList.remove("hit-effect");
            gameArea.classList.remove("hit-effect");
        }, 350);
    },

    showMessage(msg) {
        document.getElementById("message").innerText = msg;
    }
};

const RankingManager = {
    saveScore(name, score) {
        if (!name) {
            alert("이름 입력 필요");
            return;
        }

        let ranks = JSON.parse(localStorage.getItem("ranking")) || [];

        ranks.push({ name: name, score: score });
        ranks.sort((a, b) => b.score - a.score);

        if (ranks.length > 5) {
            ranks = ranks.slice(0, 5);
        }

        localStorage.setItem("ranking", JSON.stringify(ranks));
        this.render();
    },

    render() {
        const rankDiv = document.getElementById("ranking");
        const ranks = JSON.parse(localStorage.getItem("ranking")) || [];

        if (ranks.length === 0) {
            rankDiv.innerHTML = "<h3>랭킹 (최고 5명)</h3>아직 등록된 점수가 없습니다.";
            return;
        }

        rankDiv.innerHTML =
            "<h3>랭킹 (최고 5명)</h3>" +
            ranks.map((r, i) => `${i + 1}. ${r.name}: ${r.score}점`).join("<br>");
    },

    clear() {
        localStorage.removeItem("ranking");
        this.render();
        UIManager.showMessage("랭킹 점수판이 초기화되었습니다.");
    }
};

class Game {
    constructor() {
        this.player = new Player(50, 180, 3);
        this.obstacles = [
            new Obstacle(700, 50, 4),
            new Obstacle(900, 180, 5),
            new Obstacle(1100, 300, 6)
        ];

        this.score = 0;
        this.level = 1;
        this.timer = null;
        this.isRunning = false;
        this.playerName = "";
        this.saveUsed = false;
    }

    getInputName() {
        const name = document.getElementById("playerName").value.trim();

        if (name === "") {
            alert("이름을 입력한 뒤 게임을 시작해주세요.");
            return null;
        }

        return name;
    }

    startLoop(message) {
        clearInterval(this.timer);

        this.isRunning = true;
        UIManager.showMessage(message);

        this.timer = setInterval(() => {
            this.update();
        }, 30);
    }

    start() {
        if (this.isRunning) return;

        const name = this.getInputName();
        if (name === null) return;

        this.playerName = name;
        this.startLoop(name + "님 게임 진행 중");
    }

    stop() {
        clearInterval(this.timer);
        this.isRunning = false;
        UIManager.showMessage("게임 일시정지");
    }

    restart() {
        const name = this.getInputName();
        if (name === null) return;

        StorageManager.clear();

        this.playerName = name;
        this.resetGame();

        this.startLoop(name + "님 새 게임을 시작합니다.");
    }

    save() {
        if (!this.isRunning) {
            alert("게임 진행 중에만 중간 저장할 수 있습니다.");
            return;
        }

        if (this.saveUsed) {
            alert("중간 저장은 한 판에 한 번만 사용할 수 있습니다.");
            return;
        }

        this.saveUsed = true;
        StorageManager.save(this);
    }

    load() {
        const sd = StorageManager.load();
        if (!sd) return;

        clearInterval(this.timer);

        this.score = sd.score;
        this.level = sd.level;
        this.playerName = sd.playerName || document.getElementById("playerName").value.trim();

        this.player = new Player(sd.playerX, sd.playerY, sd.playerLife);
        this.player.speed = sd.playerSpeed || 20;
        this.player.hasPower = sd.playerHasPower || false;

        this.obstacles = sd.obstacles.map(ob => new Obstacle(ob.x, ob.y, ob.speed));
        this.saveUsed = true;

        StorageManager.clear();
        this.render();

        const displayName = this.playerName || "플레이어";
        this.startLoop(displayName + "님 저장 지점에서 이어하기를 시작합니다. 불러온 저장 데이터는 재사용할 수 없습니다.");
    }

    update() {
        this.score += 1;

        if (this.score % 500 === 0) {
            this.level += 1;
            this.obstacles.forEach(ob => ob.speed += 1);

            if (this.level === 3) {
                this.obstacles.push(new Obstacle(1200, Math.floor(Math.random() * 360), 4));
                this.player.powerUp();
                UIManager.showMessage("레벨 3 도달! 장애물 추가, 플레이어 강화!");
            }
        }

        for (let ob of this.obstacles) {
            ob.move();

            if (this.checkCollision(this.player, ob)) {
                this.player.life -= 1;
                ob.x = 700;
                ob.y = Math.floor(Math.random() * 360);

                UIManager.playHitEffect();
                UIManager.showMessage("장애물과 충돌했습니다! 생명력이 1 감소했습니다.");

                if (this.player.life <= 0) {
                    this.render();
                    clearInterval(this.timer);
                    this.isRunning = false;

                    setTimeout(() => {
                        this.gameOver();
                    }, 350);
                    return;
                }
            }
        }

        this.render();
    }

    checkCollision(p, o) {
        return (
            p.x < o.x + 40 &&
            p.x + 40 > o.x &&
            p.y < o.y + 40 &&
            p.y + 40 > o.y
        );
    }

    gameOver() {
        clearInterval(this.timer);
        this.isRunning = false;

        const finalScore = this.score;
        const finalName = this.playerName;

        RankingManager.saveScore(finalName, finalScore);
        StorageManager.clear();

        this.resetGame();

        UIManager.showMessage(
            "게임 오버! " + finalName + "님의 점수 " + finalScore +
            "점이 자동 등록되었습니다. 다시 하려면 '처음부터'를 누르세요."
        );
    }

    resetGame() {
        this.player = new Player(50, 180, 3);
        this.obstacles = [
            new Obstacle(700, 50, 4),
            new Obstacle(900, 180, 5),
            new Obstacle(1100, 300, 6)
        ];

        this.score = 0;
        this.level = 1;
        this.isRunning = false;
        this.saveUsed = false;

        this.render();
        RankingManager.render();
    }

    render() {
        UIManager.updatePlayer(this.player);
        UIManager.updateInfo(this);
        UIManager.updateObstacle(this.obstacles);
    }
}

let game = null;

window.onload = function() {
    game = new Game();
    game.render();
    RankingManager.render();

    document.getElementById("startBtn").onclick = function() {
        game.start();
    };

    document.getElementById("stopBtn").onclick = function() {
        game.stop();
    };

    document.getElementById("saveBtn").onclick = function() {
        game.save();
    };

    document.getElementById("loadBtn").onclick = function() {
        game.load();
    };

    document.getElementById("restartBtn").onclick = function() {
        game.restart();
    };

    document.getElementById("clearRankBtn").onclick = function() {
        RankingManager.clear();
    };

    document.onkeydown = function(e) {
        if (!game.isRunning) return;

        if (e.key === "ArrowUp") game.player.move("up");
        if (e.key === "ArrowDown") game.player.move("down");
        if (e.key === "ArrowLeft") game.player.move("left");
        if (e.key === "ArrowRight") game.player.move("right");

        game.render();
    };
};
</script>
</head>

<body>
<h1>장애물 피하기 게임</h1>

<div id="info">
    점수: <span id="scoreText">0</span> /
    생명: <span id="lifeText">3</span> /
    레벨: <span id="levelText">1</span>
</div>

<div>
    <button id="startBtn">게임 시작</button>
    <button id="stopBtn">일시정지</button>
    <button id="saveBtn">중간 저장</button>
    <button id="loadBtn">이어하기</button>
    <button id="restartBtn">처음부터</button>
</div>

<div id="gameArea">
    <div id="player"></div>
    <div class="obstacle"></div>
    <div class="obstacle"></div>
    <div class="obstacle"></div>
</div>

<div id="message">방향키로 파란색 캐릭터를 움직이세요.</div>

<div id="ranking"></div>

<div id="nameArea">
    <input type="text" id="playerName" placeholder="이름 입력 후 게임 시작">
    <br>
    <button id="clearRankBtn">랭킹 초기화</button>
</div>

</body>
</html>
