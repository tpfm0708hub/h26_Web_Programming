<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>영화 후기 작성</title>
</head>

<body>
    <header>
        <h1>흐린 기억속 영화관</h1>
        <hr>
    </header>

    <main>
        <a href="../index.html">메인으로 돌아가기</a>

        <section>
            <h2>영화 후기 작성</h2>
            <p>영화에 대해 감상 후기를 남겨주세요.</p>

            <form action="#" method="post">
                <fieldset>
                    <legend>후기 정보</legend>

                    <p>
                        <label for="email">작성자 메일주소</label><br>
                        <input type="text" id="email" name="email" placeholder="이메일 입력">
                    </p>

                    <p>
                        <label for="movie">감상한 영화</label><br>
                        <select id="movie" name="movie">
                            <option value="라이언일병구하기">라이언 일병 구하기</option>
                            <option value="킹덤오브헤븐">킹덤 오브 헤븐</option>
                        </select>
                    </p>

                    <p>
                        <label for="score">평점</label><br>
                        <input type="number" id="score" name="score" min="1" max="10" placeholder="1~10점">
                    </p>

                    <p>
                        <label for="review">후기 내용</label><br>
                        <textarea id="review" name="review" rows="8" cols="60" placeholder="영화 감상 후기 작성"></textarea>
                    </p>

                    <p>
                        <button type="submit">후기 제출</button>
                        <button type="reset">다시 작성</button>
                    </p>
                </fieldset>
            </form>
        </section>
    </main>

    <footer>
        <hr>
        <a href="../index.html">메인으로 돌아가기</a>
    </footer>
</body>
</html>
