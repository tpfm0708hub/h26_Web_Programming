<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프로그래머 계산기</title>
    <style>
        /* 전체 배경 설정 (다크 모드) */
        body {
            background-color: #1e1e1e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Courier New', Courier, monospace; /* 프로그래머 감성의 폰트 */
        }

        /* 계산기 몸체 설정 */
        table {
            background-color: #2d2d2d;
            border-collapse: separate;
            border-spacing: 12px; /* 버튼 사이의 간격 */
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.6);
            border: none;
        }

        /* 디스플레이 화면 (LCD 스타일) */
        input[type="text"] {
            width: 100%;
            background-color: #a3c2a4; /* 고전적인 계산기 화면 색상 */
            border: none;
            border-radius: 10px;
            font-size: 2.5rem;
            text-align: right;
            padding: 20px;
            box-sizing: border-box;
            color: #111;
            font-family: inherit;
            font-weight: bold;
            box-shadow: inset 0 5px 10px rgba(0, 0, 0, 0.2); /* 안쪽 그림자로 깊이감 부여 */
        }

        /* 기본 버튼 스타일 */
        td {
            background-color: #444;
            color: #fff;
            text-align: center;
            vertical-align: middle;
            padding: 18px 10px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.5rem;
            font-weight: bold;
            transition: all 0.1s ease-in-out;
            user-select: none; /* 클릭 시 텍스트 드래그 방지 */
            box-shadow: 0 4px #222;
        }

        /* 마우스 호버 및 클릭 액션 */
        td:hover { background-color: #555; }
        td:active { 
            transform: translateY(4px); 
            box-shadow: 0 0px #222; 
        }

        /* 기능별 색상 포인트 클래스 */
        .btn-clear { background-color: #e53935; color: white; box-shadow: 0 4px #b71c1c; }
        .btn-clear:hover { background-color: #f44336; }
        
        .btn-operator { background-color: #ff9800; color: white; box-shadow: 0 4px #e65100; }
        .btn-operator:hover { background-color: #ffb74d; }
        
        .btn-equal { background-color: #4caf50; color: white; box-shadow: 0 4px #1b5e20; }
        .btn-equal:hover { background-color: #81c784; }
        
        .btn-prog { background-color: #3949ab; font-size: 1.1rem; box-shadow: 0 4px #1a237e; }
        .btn-prog:hover { background-color: #5c6bc0; }

        /* 프로그래머 용도 라벨 (클릭 효과 제외) */
        .label { 
            background-color: transparent; 
            cursor: default; 
            font-size: 1rem; 
            color: #888; 
            box-shadow: none; 
        }
        .label:hover { background-color: transparent; }
        .label:active { transform: none; box-shadow: none; }
    </style>
</head>
<body>
    <table>
        <tr>
            <td colspan="4" style="background: transparent; box-shadow: none; padding: 0 0 15px 0;">
                <input type="text" id="display" readonly> </td>
        </tr>
        <tr>
            <td colspan="3" class="btn-clear" onclick="reset()">AC</td>
            <td class="btn-operator" onclick="add('/')">/</td>
        </tr>
        <tr>
            <td onclick="add(1)">1</td>
            <td onclick="add(2)">2</td>
            <td onclick="add(3)">3</td>
            <td class="btn-operator" onclick="add('*')">*</td>
        </tr>
        <tr>
            <td onclick="add(4)">4</td>
            <td onclick="add(5)">5</td>
            <td onclick="add(6)">6</td>
            <td class="btn-operator" onclick="add('-')">-</td>
        </tr>
        <tr>
            <td onclick="add(7)">7</td>
            <td onclick="add(8)">8</td>
            <td onclick="add(9)">9</td>
            <td class="btn-operator" onclick="add('+')">+</td>            
        </tr>
        <tr>
            <td colspan="2" onclick="add(0)">0</td>
            <td onclick="add('.')">.</td>
            <td class="btn-equal" onclick="calculate()">=</td>            
        </tr>
        <tr>
            <td class="label">프로그래머<br>용도</td>
            <td class="btn-prog" onclick="transform_08()">8<br>진수</td>
            <td class="btn-prog" onclick="transform_16()">16<br>진수</td>
            <td class="btn-prog" onclick="transform_10()">10<br>진수</td>
        </tr>
    </table>

    <script>
        function add(char){
            var display = document.getElementById('display');
            if (display.value === "" && (char === '+' || char === '-' || char === '*' || char === '/')){
                return;
            }
            display.value = display.value + char;
        }
        function calculate(){
            var display = document.getElementById('display');
            var display = eval(display.value);
            document.getElementById('display').value = display;
        }
        function reset(){
            document.getElementById('display').value = "";
        }
        function transform_08(){
            var display = document.getElementById('display');
            var display = Number(display.value).toString(8);
            document.getElementById('display').value = display;
        }
        function transform_16(){
            var display = document.getElementById('display');
            var display = Number(display.value).toString(16);
            document.getElementById('display').value = display;
        }
        function transform_10(){
            var display = document.getElementById('display');
            var display = Number(display.value).toString(10);
            document.getElementById('display').value = display;
        }
    </script>
</body>
</html>
