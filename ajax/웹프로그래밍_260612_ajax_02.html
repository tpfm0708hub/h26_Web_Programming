<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        document.addEventListener('DOMContentLoaded', function(){
            console.log('click')
            let btn = document.querySelector('button')
            btn.addEventListener('click', async function(){
                let name = document.inputform.name.value
                let age  = document.inputform.age.value

                let response = await fetch('https://jsonplaceholder.typicode.com/posts', {
                    method: 'post',//Post 방식 처리
                    headers : {
                        'content-type' : 'application/x-www-form-urlencoded'
                    },
                    body: //`name = ${name} & age = ${age}`
                         new URLSearchParams({
                            name,
                            age
                         })
                })
                if(response.ok){
                    let data =await response.text()
                    data = JSON.parse(data)
                    console.log(data)

                    let msg = `name : ${data.name} age : ${data.age}\n`
                    let log = document.querySelector('#log')
                    log.textContent += msg
                }
            })
        })
    </script>
</head>
<body>
    <textarea rows = '10' cols = '60' id = 'log'></textarea>
    <form name = 'inputform' enctype="application/x-www-form-urlencoded">
        이름 : <input type="text" name = "name"><br>
        나이 : <input type="text" name = "age"><br>
    </form>
    <button>전송</button>
</body>
</html>
