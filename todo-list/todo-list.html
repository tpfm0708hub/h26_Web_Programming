<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>고급 Todo List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="todoStyle.css">
    <script src="todoScript.js"></script>
</head>
<body>
    <div class="container mt-5" style="max-width: 800px;">
        <h1 class="fw-bold mb-4">고급 Todo List</h1>
        
        <div class="d-flex gap-2 mb-3 flex-wrap">
            <input type="text" id="todoInput" class="form-control" style="width: 200px;" placeholder="할 일을 입력하세요">
            <select id="category" class="form-select" style="width: auto;">
                <option value="공부">공부</option>
                <option value="과제">과제</option>
                <option value="운동">운동</option>
                <option value="취미">취미</option>
                <option value="기타">기타</option>
            </select>
            <select id="priority" class="form-select" style="width: auto;">
                <option value="높음">높음</option>
                <option value="중간" selected>중간</option>
                <option value="낮음">낮음</option>
            </select>
            
            <input type="text" id="dueDate" class="form-control" style="width: 150px;" 
                   placeholder="마감일자 설정" 
                   onfocus="this.type='date'" 
                   onblur="if(!this.value) this.type='text'">
            
            <button type="button" id="addBtn" class="btn btn-outline-secondary">추가</button>
            <button type="button" id="editCompleteBtn" class="btn btn-outline-primary" disabled>수정 완료</button>
        </div>

        <div class="mb-3">
            <input type="search" id="searchInput" class="form-control" style="width: 200px;" placeholder="검색">
        </div>

        <div class="mb-4">
            <div class="btn-group mb-3">
                <button type="button" class="btn btn-outline-secondary active" onclick="changeFilter('all', this)">전체</button>
                <button type="button" class="btn btn-outline-secondary" onclick="changeFilter('active', this)">진행중</button>
                <button type="button" class="btn btn-outline-secondary" onclick="changeFilter('completed', this)">완료</button>
            </div>
            
            <div class="d-flex align-items-center gap-2">
                <label class="form-label mb-0 fw-bold">정렬 방식:</label>
                <div class="btn-group" role="group">
                    <button type="button" id="btnSortReg" class="btn btn-outline-dark active" onclick="changeSortCriterion('regDate')">등록일</button>
                    <button type="button" id="btnSortDue" class="btn btn-outline-dark" onclick="changeSortCriterion('dueDate')">마감일</button>
                </div>
                <select id="sortOrderSelect" class="form-select" style="width: 120px;">
                    <option value="desc">최신순</option>
                    <option value="asc">과거순</option>
                </select>
            </div>
        </div>

        <p id="todoStats" class="mb-3 fw-bold">전체: 0개 | 진행중: 0개 | 완료: 0개</p>

        <ul id="todolist" style="padding: 0;"></ul>
    </div>
</body>
</html>
