<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        //단을 입력받아 구구단을 브라우저 출력
        let dan = parseInt(prompt('단을 입력하시오'))
        
        document.write(`*** ${dan} 단 ***`)
        let i = 1
        while (i <= 9) {
            document.write(`<br>${dan} * ${i} = ${dan * i}<br>`)
            ++i
        }
        document.write(`<hr>`)

        for(i = 1; i <=9; i++){
            document.write(`${dan} * ${i} = ${ dan * i }<br>`)

        }

    </script>
</head>
<body>
    
</body>
</html>
